name: Deploy to Vercel

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  VERCEL_ORG_ID: team_7AmFiBGJasHZWI3Jk0LPnmwh
  VERCEL_PROJECT_ID: prj_vm451bgqBJKi9FiGZKhCzJoKnY4K

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static site from committed data
        run: npm run build:committed

      - name: Prepare Vercel output
        run: |
          rm -rf .vercel/output
          mkdir -p .vercel/output/static
          cp -R out/. .vercel/output/static/
          node - <<'NODE'
          const fs = require("fs");
          const securityHeaders = {
            "Content-Security-Policy": "default-src 'self'; base-uri 'self'; frame-ancestors 'none'; object-src 'none'; form-action 'self'; img-src 'self' data: blob: https://pbs.twimg.com https://github.com https://raw.githubusercontent.com https://opengraph.githubassets.com; font-src 'self' data:; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src 'self'; upgrade-insecure-requests",
            "X-Content-Type-Options": "nosniff",
            "X-Frame-Options": "DENY",
            "Referrer-Policy": "strict-origin-when-cross-origin",
            "Permissions-Policy": "camera=(), microphone=(), geolocation=(), payment=(), usb=(), fullscreen=(self)",
            "Cross-Origin-Opener-Policy": "same-origin",
            "Strict-Transport-Security": "max-age=31536000; includeSubDomains; preload"
          };
          fs.writeFileSync(
            ".vercel/output/config.json",
            `${JSON.stringify({ version: 3, routes: [{ src: "/(.*)", headers: securityHeaders, continue: true }] }, null, 2)}\n`
          );
          NODE

      - name: Deploy production
        id: deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          if [ -z "${VERCEL_TOKEN}" ]; then
            echo "VERCEL_TOKEN secret is required for production deploys."
            exit 1
          fi
          npx vercel@52.0.0 deploy --prebuilt --prod --yes --archive=tgz --token="${VERCEL_TOKEN}" | tee /tmp/vercel-deploy.log
          DEPLOYMENT_URL="$(grep -Eo 'https://[^ ]+\.vercel\.app' /tmp/vercel-deploy.log | tail -n 1)"
          if [ -z "${DEPLOYMENT_URL}" ]; then
            echo "Unable to find deployment URL in Vercel output."
            exit 1
          fi
          echo "deployment_url=${DEPLOYMENT_URL}" >> "$GITHUB_OUTPUT"
