name: Deploy to Vercel

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci || npm install

      - name: Build static site
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: npm run build

      - name: Prepare Vercel output
        run: |
          rm -rf .vercel/output
          mkdir -p .vercel/output/static
          cp -R out/. .vercel/output/static/
          printf '{"version":3}\n' > .vercel/output/config.json

      - name: Deploy production
        id: deploy
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          npx vercel@latest deploy --prebuilt --prod --yes --token="${VERCEL_TOKEN}" | tee /tmp/vercel-deploy.log
          DEPLOYMENT_URL="$(grep -Eo 'https://[^ ]+\.vercel\.app' /tmp/vercel-deploy.log | tail -n 1)"
          echo "deployment_url=${DEPLOYMENT_URL}" >> "$GITHUB_OUTPUT"

      - name: Alias production domain
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: npx vercel@latest alias set "${{ steps.deploy.outputs.deployment_url }}" xiaoqi-ai.vercel.app --token="${VERCEL_TOKEN}"
