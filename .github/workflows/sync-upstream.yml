name: Sync upstream prompts

on:
  schedule:
    - cron: "20 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci || npm install

      - name: Sync upstream data
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: npm run sync:upstream

      - name: Verify build
        run: npm run build:next

      - name: Commit synced data
        run: |
          if [ -n "$(git status --porcelain data/generated data/upstream)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -f data/generated data/upstream
            git commit -m "chore: sync upstream prompts"
            git push
          else
            echo "No synced data changes."
          fi
